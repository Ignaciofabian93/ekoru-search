# Local/dev infrastructure for ekoru-search.
#
# Self-hosted Typesense node backing the `search` query. Access is config-driven
# (TYPESENSE_* env), so moving to Typesense Cloud later is just an env change.
#
# NOTE: capture this service in terraform/ for IONOS/cloud provisioning later
# (see docs/SEARCH_SCALABILITY_PLAN.md).
services:
  typesense:
    image: typesense/typesense:27.1
    container_name: ekoru-typesense
    restart: unless-stopped
    ports:
      - "8108:8108"
    volumes:
      - typesense-data:/data
    command: >
      --data-dir /data
      --api-key=${TYPESENSE_API_KEY:-dev-typesense-key}
      --enable-cors

volumes:
  typesense-data:
